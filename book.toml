[book]
title = "ProcessKit"
description = "Async child-process management for .NET — kernel-backed whole-tree kill-on-dispose, from F# and C#"
src = "docs"
language = "en"

[output.html]
git-repository-url = "https://github.com/ZelAnton/ProcessKit-fSharp"
edit-url-template = "https://github.com/ZelAnton/ProcessKit-fSharp/edit/main/docs/{path}"
site-url = "/ProcessKit-fSharp/"
additional-css = ["theme/custom.css"]
# nav-links.js upgrades the Rust/Python reserved draft chapters immediately after
# Overview into external links and marks the .NET entry as the current implementation.
# mdBook has no native way to point a sidebar entry at an external URL.
additional-js = ["theme/nav-links.js"]
